<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TortiMap Cantabria</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cafe: #3C2A21; --tortilla: #FFC93C; --crema: #F9F5EB; 
            --accent: #E48F45; --white: #ffffff; --danger: #ff4d4d; --blue-gps: #4285F4;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--crema); color: var(--cafe); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--cafe); color: var(--tortilla); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        #map { height: 400px; width: 100%; border-bottom: 4px solid var(--accent); z-index: 5; background: #ddd; }

        .page-wrapper {
            position: relative; flex-grow: 1;
            background: url('tortilla.jpg') no-repeat center center fixed;
            background-size: cover;
            z-index: 10;
        }
        .content-overlay { background: rgba(249, 245, 235, 0.8); backdrop-filter: blur(4px); min-height: 100%; padding: 30px 0; }
        .main-content { max-width: 1200px; margin: auto; width: 95%; }

        .rankings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .rankings-grid { grid-template-columns: 1fr; } }
        .rank-card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .rank-item:hover { background: var(--tortilla); border-radius: 8px; }

        .fab-logo { position: fixed; bottom: 30px; left: 30px; z-index: 2000; width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--cafe); cursor: pointer; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.4); overflow: hidden; }
        .fab-logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 2000; }
        .fab { background: var(--cafe); color: var(--tortilla); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; border: 2px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        .fab-logo:hover::after { content: "blastercd@hotmail.com"; position: absolute; bottom: 75px; left: 0; background: var(--cafe); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; white-space: nowrap; }
        .fab-container:hover::after { content: "Añadir tortilla"; position: absolute; bottom: 75px; right: 0; background: var(--cafe); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; white-space: nowrap; }

        .admin-btn { display: none; background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; margin-top: 5px; font-weight: bold; }
        #logout-admin { display: none; position: fixed; bottom: 110px; left: 30px; z-index: 2001; background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #visit-counter { display: none; position: fixed; bottom: 160px; left: 30px; z-index: 2001; background: var(--cafe); color: var(--tortilla); padding: 8px 15px; border-radius: 10px; font-size: 12px; border: 1px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: bold; }
        
        body.admin-mode .admin-btn, 
        body.admin-mode #logout-admin, 
        body.admin-mode #visit-counter { display: block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; backdrop-filter: blur(5px); }
        .modal-content { background: var(--crema); width: 90%; max-width: 550px; margin: 3vh auto; padding: 25px; border-radius: 20px; max-height: 90vh; overflow-y: auto; position: relative; border: 3px solid var(--tortilla); }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 35px; cursor: pointer; font-weight: bold; }
        
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .maps-search-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-maps-search { background: #4285F4; color: white; border: none; border-radius: 10px; padding: 0 15px; cursor: pointer; font-weight: bold; font-size: 12px; white-space: nowrap; }

        .tortilla-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 12px; }
        .check-item { display: flex; align-items: center; font-size: 0.85rem; }
        .check-item input { width: auto; margin-right: 8px; margin-bottom: 0; }

        .btn-main { background: var(--cafe); color: var(--tortilla); border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .review-box { background: white; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 6px solid var(--tortilla); position: relative; }
        .gps-link { color: var(--blue-gps); font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px; border: 1px solid var(--blue-gps); padding: 5px 10px; border-radius: 5px; background: white; }
    </style>
</head>
<body>

<header><h1>🍳 TortiMap Cantabria</h1></header>

<div id="map"></div>

<div class="page-wrapper">
    <div class="content-overlay">
        <div class="main-content">
            <div class="rankings-grid">
                <div class="rank-card"><h2>💰 Más Baratas</h2><div id="list-precio"></div></div>
                <div class="rank-card"><h2>🏆 Top Valoradas</h2><div id="list-stars"></div></div>
            </div>
            <p style="text-align: center; margin-top: 50px; opacity: 0.5; cursor: pointer; font-weight: bold;" onclick="checkAdmin()">Blaster © 2026</p>
        </div>
    </div>
</div>

<div id="visit-counter">Visitas totales: 0</div>
<button id="logout-admin" onclick="exitAdmin()">🚪 Salir Modo Admin</button>

<div class="fab-logo" title="blastercd@hotmail.com" onclick="window.location.href='mailto:blastercd@hotmail.com'"><img src="logo.jpeg"></div>
<div class="fab-container" title="Añadir tortilla"><div class="fab" onclick="openModal('modalForm')">+</div></div>

<div id="modalForm" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('modalForm')">×</span>
        <h3>Registrar Local</h3>
        <input type="text" id="f-nombre" placeholder="Nombre del Bar">
        <input type="text" id="f-autor" placeholder="Tu nombre">
        <div class="maps-search-row">
            <input type="text" id="f-coords" placeholder="Latitud, Longitud (ej: 43.46, -3.80)" style="margin-bottom:0">
            <button class="btn-maps-search" onclick="buscarEnGoogleMaps()">BUSCAR EN MAPS</button>
        </div>
        <input type="number" id="f-precio" step="0.01" placeholder="Precio pincho (€)">
        <div class="tortilla-grid">
            <label class="check-item"><input type="checkbox" class="tipo" value="Jamon Iberico"> Jamón Ibérico</label>
            <label class="check-item"><input type="checkbox" class="tipo" value="Bonito"> Bonito</label>
            <label class="check-item"><input type="checkbox" class="tipo" value="Boloñesa"> Boloñesa</label>
            <label class="check-item"><input type="checkbox" class="tipo" value="Jamon y Queso"> Jamón y Queso</label>
        </div>
        <input type="text" id="f-otra-desc" placeholder="Otra variedad...">
        <select id="f-stars">
            <option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option>
        </select>
        <textarea id="f-comentario" placeholder="Tu opinión..."></textarea>
        <label>Añadir Foto:</label>
        <input type="file" id="f-foto" accept="image/*">
        <button class="btn-main" onclick="guardarNuevo()">PUBLICAR PINCHO</button>
    </div>
</div>

<div id="modalDetails" class="modal">
    <div class="modal-content" id="details-content"></div>
</div>

<script>
    let locales = JSON.parse(localStorage.getItem('tortiData')) || [];
    let map, markersLayer;

    let visitas = parseInt(localStorage.getItem('tortiVisitas')) || 0;
    visitas++;
    localStorage.setItem('tortiVisitas', visitas);
    document.getElementById('visit-counter').innerText = "Visitas totales: " + visitas;

    function initMap() {
        map = L.map('map').setView([43.35, -3.95], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markersLayer = L.layerGroup().addTo(map);
        renderAll();
        setTimeout(() => map.invalidateSize(), 500);
    }

    function checkAdmin() { if(prompt("Pass:") === "1234") { document.body.classList.add('admin-mode'); renderAll(); } }
    function exitAdmin() { document.body.classList.remove('admin-mode'); renderAll(); }
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function buscarEnGoogleMaps() {
        const nombre = document.getElementById('f-nombre').value;
        const query = nombre ? encodeURIComponent(nombre + " Cantabria") : "Cantabria";
        window.open("https://www.google.com/maps/search/" + query, "_blank");
    }

    function guardarNuevo() {
        const nombre = document.getElementById('f-nombre').value.trim();
        const coords = document.getElementById('f-coords').value.trim();
        const precio = parseFloat(document.getElementById('f-precio').value);
        if(!nombre || !coords || !precio) return alert("Faltan datos");

        const [lat, lng] = coords.split(',').map(c => parseFloat(c.trim()));
        const variedades = Array.from(document.querySelectorAll('.tipo:checked')).map(c => c.value);
        const otra = document.getElementById('f-otra-desc').value;
        if(otra) variedades.push(otra);

        const fotoFile = document.getElementById('f-foto').files[0];
        const save = (img) => {
            locales.push({ 
                id: Date.now(), nombre, lat, lng, precio, 
                variedad: variedades.join(", ") || "Clásica",
                estrellas: parseInt(document.getElementById('f-stars').value),
                comentarios: [{ id: Date.now(), autor: document.getElementById('f-autor').value || "Anónimo", text: document.getElementById('f-comentario').value, stars: parseInt(document.getElementById('f-stars').value), foto: img }] 
            });
            localStorage.setItem('tortiData', JSON.stringify(locales));
            renderAll(); closeModal('modalForm');
        };
        if(fotoFile) { const r = new FileReader(); r.onload = (e) => save(e.target.result); r.readAsDataURL(fotoFile); } else save(null);
    }

    function renderAll() {
        if (!markersLayer) return;
        markersLayer.clearLayers();
        const lp = document.getElementById('list-precio'), ls = document.getElementById('list-stars');
        const porP = [...locales].sort((a,b) => a.precio - b.precio), porS = [...locales].sort((a,b) => b.estrellas - a.estrellas);

        const html = (l, v) => `<div class="rank-item" onclick="verDetalle(${l.id})"><span>${l.nombre}${document.body.classList.contains('admin-mode') ? `<br><button class="admin-btn" onclick="borrarLocal(${l.id}, event)">ELIMINAR BAR</button>` : ''}</span><b>${v}</b></div>`;

        lp.innerHTML = porP.map(l => html(l, l.precio.toFixed(2)+'€')).join('');
        ls.innerHTML = porS.map(l => html(l, '⭐'.repeat(l.estrellas))).join('');

        locales.forEach(l => {
            const googleDirUrl = "https://www.google.com/maps/dir/?api=1&destination=" + l.lat + "," + l.lng;
            L.marker([l.lat, l.lng]).addTo(markersLayer).bindPopup("<b>" + l.nombre + "</b><br>" + l.precio.toFixed(2) + "€<br><a href='" + googleDirUrl + "' target='_blank' class='gps-link'>📍 IR CON GPS</a>");
        });
    }

    function verDetalle(id) {
        const l = locales.find(x => x.id === id);
        const isAdmin = document.body.classList.contains('admin-mode');
        document.getElementById('details-content').innerHTML = `
            <span class="close-btn" onclick="closeModal('modalDetails')">×</span>
            <h2>${l.nombre}</h2>
            <p><strong>Variedad:</strong> ${l.variedad}</p>
            <div id="reviews-list">
                ${l.comentarios.map(c => `
                    <div class="review-box">
                        <strong>${c.autor}:</strong> ${'⭐'.repeat(c.stars)}
                        <p>${c.text}</p>
                        ${c.foto ? `<img src="${c.foto}" style="width:100%; border-radius:8px; margin-top:5px;">` : ''}
                        ${isAdmin ? `<button class="admin-btn" style="display:block; background:red; margin-top:10px;" onclick="borrarComentario(${l.id}, ${c.id})">BORRAR ESTA OPINIÓN</button>` : ''}
                    </div>
                `).join('')}
            </div>
            <hr>
            <h4>Añadir opinión</h4>
            <input type="text" id="n-autor" placeholder="Nombre">
            <select id="n-stars"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select>
            <textarea id="n-text" placeholder="Tu reseña..."></textarea>
            <input type="file" id="n-foto" accept="image/*">
            <button class="btn-main" onclick="addReview(${l.id})">PUBLICAR</button>
        `;
        openModal('modalDetails');
    }

    function addReview(lId) {
        const l = locales.find(x => x.id === lId);
        const fotoFile = document.getElementById('n-foto').files[0];
        const saveR = (img) => {
            l.comentarios.push({ id: Date.now(), autor: document.getElementById('n-autor').value || "Anónimo", text: document.getElementById('n-text').value, stars: parseInt(document.getElementById('n-stars').value), foto: img });
            l.estrellas = Math.round(l.comentarios.reduce((a,b) => a + b.stars, 0) / l.comentarios.length);
            localStorage.setItem('tortiData', JSON.stringify(locales));
            renderAll(); verDetalle(lId);
        };
        if(fotoFile) { const r = new FileReader(); r.onload = (e) => saveR(e.target.result); r.readAsDataURL(fotoFile); } else saveR(null);
    }

    function borrarLocal(id, e) { e.stopPropagation(); if(confirm("¿Borrar bar completo?")) { locales = locales.filter(x => x.id !== id); localStorage.setItem('tortiData', JSON.stringify(locales)); renderAll(); } }
    
    function borrarComentario(lId, cId) { 
        if(confirm("¿Eliminar solo esta opinión?")) {
            const l = locales.find(x => x.id === lId);
            l.comentarios = l.comentarios.filter(c => c.id !== cId);
            if(l.comentarios.length > 0) {
                l.estrellas = Math.round(l.comentarios.reduce((a,b) => a + b.stars, 0) / l.comentarios.length);
            } else {
                l.estrellas = 0;
            }
            localStorage.setItem('tortiData', JSON.stringify(locales));
            renderAll(); 
            verDetalle(lId);
        }
    }

    window.onload = initMap;
</script>
</body>
</html>
